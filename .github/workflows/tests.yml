---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main
    if: github.event_name == 'pull_request'
  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@main
  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@main
  unit-source:
    uses: ansible-network/github_actions/.github/workflows/unit_source.yml@main
    with:
      collection_pre_install: >-
        git+https://github.com/ansible-collections/ansible.utils.git
  all_green:
    # Run after every needed job finishes (success or failure), but skip when the
    # workflow run was cancelled (e.g. superseded by concurrency) so we never "pass" on cancelled deps.
    if: ${{ always() && !cancelled() }}
    needs:
      - changelog
      - build-import
      - sanity
      - unit-galaxy
      - unit-source
      - ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        env:
          R_CHANGELOG: ${{ needs['changelog'].result }}
          R_BUILD_IMPORT: ${{ needs['build-import'].result }}
          R_ANSIBLE_LINT: ${{ needs['ansible-lint'].result }}
          R_SANITY: ${{ needs['sanity'].result }}
          R_UNIT_GALAXY: ${{ needs['unit-galaxy'].result }}
          R_UNIT_SOURCE: ${{ needs['unit-source'].result }}
        run: |
          import os

          results = {
              "changelog": os.environ["R_CHANGELOG"],
              "build-import": os.environ["R_BUILD_IMPORT"],
              "ansible-lint": os.environ["R_ANSIBLE_LINT"],
              "sanity": os.environ["R_SANITY"],
              "unit-galaxy": os.environ["R_UNIT_GALAXY"],
              "unit-source": os.environ["R_UNIT_SOURCE"],
          }
          must_succeed = (
              "build-import",
              "ansible-lint",
              "sanity",
              "unit-galaxy",
              "unit-source",
          )
          for name in must_succeed:
              r = results[name]
              assert r == "success", f"{name}: expected success, got {r!r}"
          cl = results["changelog"]
          assert cl in ("success", "skipped"), (
              f"changelog: expected success or skipped, got {cl!r}"
          )
        shell: python
