---
# defaults file for system_config

# system_config_flatpak_packages:
#   - com.jgraph.drawio.desktop
#   - com.mattjakeman.ExtensionManager
#   - com.slack.Slack
#   - im.riot.Riot
#   - io.podman_desktop.PodmanDesktop
#   # - org.flameshot.Flameshot
#   # - org.gnome.DejaDup
#   - org.shotcut.Shotcut
#   - org.pgadmin.pgAdmin4
#   - org.videolan.VLC
#   - us.zoom.Zoom

system_config_flatpak_packages: []

# system_config_rpmfusion: none | free | nonfree | both
system_config_rpmfusion: "none"

# system_config_dnf_repositories:
#   - name: example-repo
#     description: Example Repository
#     baseurl: https://example.com/repo/$releasever/$basearch
#     gpgcheck: true
#     gpgkey: https://example.com/RPM-GPG-KEY-example

system_config_dnf_repositories: []

# system_config_copr_repositories:
#   - name: user/project

system_config_copr_repositories: []

# system_config_packages:
#   - vim-enhanced
#   - htop
#   - tmux

system_config_packages: []

# Replace conflicting distro packages in one transaction (runs before system_config_packages).
# DNF must resolve the install package name (configure repos here or elsewhere like any install).
# system_config_package_replacements:
#   - remove: libva-intel-media-driver
#     install: intel-media-driver
#   - remove: ffmpeg-free
#     install: ffmpeg
#     # allowerasing: true

system_config_package_replacements: []

# system_config_sysctl:
#   - name: vm.swappiness
#     value: "10"
# Persisted under system_config_sysctl_file (default /etc/sysctl.d/99-system_config.conf).
system_config_sysctl: []
system_config_sysctl_file: /etc/sysctl.d/99-system_config.conf

# systemd units (system scope). Each item: name (required); at least one of enabled or state;
# optional masked, daemon_reload (default false). Example:
# system_config_systemd_units:
#   - name: nginx.service
#     enabled: true
#     state: started
system_config_systemd_units: []

# system_config_v4l2loopback: true
system_config_v4l2loopback: false
system_config_v4l2loopback_devices: 1
system_config_v4l2loopback_video_nr: 20
system_config_v4l2loopback_card_label: "VirtualCam"
system_config_v4l2loopback_max_buffers: 2
system_config_v4l2loopback_exclusive_caps: 1
