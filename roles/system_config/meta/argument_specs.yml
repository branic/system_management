---
argument_specs:
  main:
    short_description: Main entrypoint for the system_config role
    description:
      - This role configures a Fedora Linux system.
    author:
      - Brant Evans
    version_added: "1.0.0"
    options:
      system_config_rpmfusion:
        type: "str"
        required: false
        default: "none"
        choices:
          - "none"
          - "free"
          - "nonfree"
          - "both"
        description:
          - "Enable RPM Fusion repositories on Fedora."
          - "'free' enables the free repository, 'nonfree' enables the nonfree"
          - "repository, 'both' enables both, and 'none' (default) skips setup."
      system_config_flatpak_packages:
        type: "list"
        elements: "str"
        required: false
        description:
          - Flatpak application IDs to install from configured remotes (e.g. Flathub).
      system_config_dnf_repositories:
        type: "list"
        elements: "dict"
        required: false
        description: "A list of DNF repositories to configure on the target system."
        options:
          name:
            type: "str"
            required: true
            description: "Unique repository ID used as the .repo filename and section header."
          description:
            type: "str"
            required: true
            description: "Human-readable name of the repository."
          baseurl:
            type: "str"
            required: false
            description: "URL to the directory where the repository repodata is located."
          metalink:
            type: "str"
            required: false
            description: "URL to a metalink file for the repository."
          gpgcheck:
            type: "bool"
            required: false
            description: "Whether to perform GPG signature checks on packages."
          gpgkey:
            type: "str"
            required: false
            description: "URL to the GPG key for the repository."
          repo_gpgcheck:
            type: "bool"
            required: false
            description: "Whether to perform GPG signature checks on the repository metadata."
          enabled:
            type: "bool"
            required: false
            default: true
            description: "Whether the repository is enabled."
          state:
            type: "str"
            required: false
            default: "present"
            choices:
              - "present"
              - "absent"
            description: "Whether the repository file should exist."
      system_config_copr_repositories:
        type: "list"
        elements: "dict"
        required: false
        description: "A list of Fedora COPR repositories to enable on the target system."
        options:
          name:
            type: "str"
            required: true
            description: "COPR repository name in owner/project format (e.g. user/project)."
          state:
            type: "str"
            required: false
            default: "enabled"
            choices:
              - "enabled"
              - "disabled"
              - "absent"
            description: "State of the COPR repository."
      system_config_packages:
        type: "list"
        elements: "str"
        required: false
        description:
          - "A list of packages to install via DNF."
          - "The full list is passed to dnf5 in a single transaction."
      system_config_package_replacements:
        type: "list"
        elements: "dict"
        required: false
        description:
          - "Pairs of packages to exchange using C(dnf swap), before C(system_config_packages) runs."
          - "Each swap removes C(remove) and installs C(install) in one transaction."
          - "Swaps run only when C(remove) is currently installed (idempotent)."
          - "The C(install) name must be visible to DNF when the task runs (same as installing any package—use this role's repo variables or repos already on the host)."
        options:
          remove:
            type: "str"
            required: true
            description: "Installed package name to remove."
          install:
            type: "str"
            required: true
            description: "Replacement package name to install."
          allowerasing:
            type: "bool"
            required: false
            default: false
            description: "Pass C(--allowerasing) to C(dnf) when dependency resolution requires erasing packages."
      system_config_v4l2loopback:
        type: "bool"
        required: false
        default: false
        description:
          - "Install and configure the v4l2loopback kernel module."
          - "When true, installs akmod-v4l2loopback and configures the module"
          - "to load at boot with a static video device number and label."
      system_config_v4l2loopback_devices:
        type: "int"
        required: false
        default: 1
        description:
          - "Number of v4l2loopback devices to create."
      system_config_v4l2loopback_video_nr:
        type: "int"
        required: false
        default: 20
        description:
          - "Video device number for the v4l2loopback virtual camera."
          - "Creates /dev/videoN where N is this value."
      system_config_v4l2loopback_card_label:
        type: "str"
        required: false
        default: "VirtualCam"
        description:
          - "Label shown for the v4l2loopback virtual camera device."
      system_config_v4l2loopback_max_buffers:
        type: "int"
        required: false
        default: 2
        description:
          - "Maximum number of buffers for the v4l2loopback device."
      system_config_v4l2loopback_exclusive_caps:
        type: "int"
        required: false
        default: 1
        description:
          - "Whether to announce OUTPUT/CAPTURE capabilities exclusively."
          - "Set to 1 so applications see the device as a capture-only camera."
      system_config_groups:
        type: "list"
        elements: "dict"
        required: false
        description: "A list of groups to create on the target system."
        options:
          name:
            type: "str"
            required: true
            description: "The group name to be created."
          gid:
            type: "int"
            required: false
            description: "The GID to use when creating the group."
          system:
            type: "bool"
            required: false
            default: false
            description: "Make the group a system group."
      system_config_users:
        type: "list"
        elements: "dict"
        required: false
        description: "A list of users to create on the target system."
        options:
          name:
            type: "str"
            required: true
            description: "The username of the user."
          uid:
            type: "int"
            required: false
            description: "The UID to use when creating the user."
          comment:
            type: "str"
            required: false
            description:
              - "Information to place in the GECOS field."
              - "This is usually the users full name."
          groups:
            type: "list"
            elements: "str"
            required: false
            description: "List of additional groups that the user is a member of."
          shell:
            type: "str"
            required: false
            choices:
              - "/bin/bash"
              - "/bin/sh"
              - "/bin/zsh"
              - "/sbin/nologin"
          system:
            type: "bool"
            required: false
            default: false
            description: "Make the user a system account."
          create_home:
            type: "bool"
            required: false
            default: true
            description: "Create the users home directory."
          password:
            type: "str"
            required: false
            description: "Password to set for the user."
          update_password:
            type: "str"
            required: false
            default: "on_create"
            choices:
              - "on_create"
              - "always"
            description: "When to update the users password."
      system_config_sysctl_file:
        type: "str"
        required: false
        default: "/etc/sysctl.d/99-system_config.conf"
        description:
          - "Path to the sysctl drop-in file used when an entry does not set C(sysctl_file)."
          - "Typically under C(/etc/sysctl.d/) so settings persist across reboots."
      system_config_sysctl:
        type: "list"
        elements: "dict"
        required: false
        description:
          - "Sysctl parameters to manage via C(ansible.posix.sysctl)."
          - "Entries are written to C(system_config_sysctl_file) unless overridden per entry."
        options:
          name:
            type: "str"
            required: true
            description: "Sysctl parameter name (for example C(vm.swappiness))."
          value:
            type: "raw"
            required: false
            description:
              - "Value to set when C(state) is C(present)."
              - "Required when C(state) is C(present)."
          state:
            type: "str"
            required: false
            default: "present"
            choices:
              - "present"
              - "absent"
            description: "Whether the parameter should be set in the sysctl file or removed."
          sysctl_file:
            type: "str"
            required: false
            description:
              - "Override C(system_config_sysctl_file) for this entry only."
          reload:
            type: "bool"
            required: false
            default: true
            description:
              - "Whether to reload sysctl immediately (C(sysctl -p)) after changing the file."
      system_config_systemd_units:
        type: "list"
        elements: "dict"
        required: false
        description:
          - "Systemd units to manage in the system scope (C(systemctl), default scope)."
          - "Each entry must set C(name). At least one of C(enabled) or C(state) is required per entry."
          - "Runs after sysctl tasks and before Flatpak."
        options:
          name:
            type: "str"
            required: true
            description: "Unit name (for example C(nginx.service) or C(sshd.socket))."
          enabled:
            type: "bool"
            required: false
            description:
              - "Whether the unit should start on boot (enable/disable)."
              - "Omit when only managing C(state) or C(masked)."
          state:
            type: "str"
            required: false
            choices:
              - "started"
              - "stopped"
              - "restarted"
              - "reloaded"
            description:
              - "Active unit state."
              - "Use C(started) with C(enabled) true for C(systemctl enable --now) behavior."
          masked:
            type: "bool"
            required: false
            description: "Whether the unit should be masked."
          daemon_reload:
            type: "bool"
            required: false
            default: false
            description:
              - "Run C(systemctl daemon-reload) before other operations for this unit."
