---
argument_specs:
  main:
    short_description: Per-user configuration preferences
    description:
      - Configures the Ansible connection user's environment preferences.
    author:
      - Brant Evans
    options:
      user_config_slack_flatpak_sockets:
        type: bool
        required: false
        default: true
        description:
          - When true, grant Slack Flatpak socket permissions (system/session bus, Wayland, not X11).

      user_config_slack_flatpak_filesystems:
        type: list
        elements: str
        required: false
        default: []
        description:
          - Extra filesystem paths for the Slack Flatpak override (e.g. "~/tmp/", "xdg-documents").
          - When empty, the filesystems line is omitted from the override file.

      user_config_gtk_include_default_bookmarks:
        type: bool
        required: false
        default: true
        description:
          - When true, prepend GNOME default bookmarks before user_config_gtk_bookmarks.

      user_config_gtk_bookmarks:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - GTK 3 sidebar bookmarks written to ~/.config/gtk-3.0/bookmarks.
        options:
          path:
            type: str
            required: true
            description:
              - Bookmark path as file:// URI, absolute path, "~", "~/", or path relative to the user's home.
          name:
            type: str
            required: false
            description: Optional display name for the bookmark.

      user_config_dconf_settings:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - Dconf settings to apply via community.general.dconf.
          - Values must be GVariant strings (e.g. "true", "false", "'hello'", "2").
        options:
          key:
            type: str
            required: true
            description:
              - The dconf key path (e.g. /org/gnome/software/download-updates).
          value:
            type: str
            required: false
            description:
              - The GVariant value to set. Required when state is present, omitted when state is absent.
          state:
            type: str
            required: false
            default: present
            choices:
              - present
              - absent
            description:
              - Whether the key should be present or absent.

      user_config_gnome_extensions:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - GNOME Shell extensions to install with gnome-extensions.
          - Each entry must include at least one of id, name, or url.
          - Resolution precedence is url, then id, then name (if url is set, id and name are ignored for lookup).
          - If both id and name are set without url, id is used.
          - Extensions are resolved via extensions.gnome.org when using id or name; downloads use a temporary directory removed after the tasks complete.
        options:
          id:
            type: int
            required: false
            description:
              - Primary key of the extension on extensions.gnome.org (used when url is not set and id is set).
          name:
            type: str
            required: false
            description:
              - Exact display name to search on extensions.gnome.org (used when url and id are not set).
          url:
            type: str
            required: false
            description:
              - Direct HTTP(S) URL to the extension zip bundle (highest precedence when set).
          enable:
            type: bool
            required: false
            default: true
            description:
              - When true, run gnome-extensions enable after install; when false, run gnome-extensions disable.
          force:
            type: bool
            required: false
            default: false
            description:
              - When true, pass -f to gnome-extensions install and reinstall even if the catalog version is not newer.
