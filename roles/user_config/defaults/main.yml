---
# defaults file for user_config

# When true, grant Slack flatpak socket permissions (system/session bus, wayland, no x11).
user_config_slack_flatpak_sockets: true

# List of extra filesystem paths for the Slack flatpak override (e.g. "~/tmp/", "xdg-documents").
# If empty or unset, the filesystems line is omitted from the override file.
user_config_slack_flatpak_filesystems: []

# When true, prepend GNOME-style default XDG bookmarks before user_config_gtk_bookmarks.
user_config_gtk_include_default_bookmarks: true

# GTK 3 sidebar bookmarks (~/.config/gtk-3.0/bookmarks). Each item: path (required), name (optional).
# path: file:// URI, absolute path, ~ or ~/ (managed user's home), or path relative to that home.
user_config_gtk_bookmarks: []

# Dconf settings to apply. Each item: key (required), value (required unless state is absent), state (default present).
# Values must be GVariant strings, e.g. "true", "false", "'hello'", "2".
user_config_dconf_settings: []

# GNOME Shell extensions (see README). Each item is a dict with at least one of id, name, url.
# Resolution order: url (if set) else id (if set) else name. Optional: enable (default true), force.
user_config_gnome_extensions: []

# When true, install uv via the standalone installer.
user_config_uv_install: true

# Specific uv version to install (e.g. "0.11.2"). When empty, installs the latest version.
user_config_uv_version: ""

# When true, allow the uv installer to modify shell profiles to add uv to PATH.
user_config_uv_modify_path: false

# Python tools to install with uv (e.g. ansible-core, black). Each item is a package specifier string.
user_config_uv_tools: []

# VS Code extensions (publisher.id or publisher.id@version to pin). Requires `code` on PATH unless user_config_vscode_cli is set.
user_config_vscode_extensions: []

# Cursor extensions (same specifier format as VS Code). Requires `cursor` on PATH unless user_config_cursor_cli is set.
user_config_cursor_extensions: []

# Full path to the VS Code `code` binary; empty uses `command -v code`.
user_config_vscode_cli: ""

# Full path to the Cursor `cursor` binary; empty uses `command -v cursor`.
user_config_cursor_cli: ""

# systemd units (user scope / systemctl --user). Each item: name (required); at least one of enabled or state;
# optional masked, daemon_reload (default false). Requires user dbus and XDG_RUNTIME_DIR (login session or lingering).
# Example:
# user_config_systemd_units:
#   - name: keyboxd.socket
#     enabled: true
#     state: started
user_config_systemd_units: []
