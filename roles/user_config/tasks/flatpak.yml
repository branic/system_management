---
- name: Flatpak | Create configuration file to set Slack flatpak permissions
  ansible.builtin.template:
    src: com.slack.Slack.overrides.j2
    dest: "{{ ansible_user_dir }}/.local/share/flatpak/overrides/com.slack.Slack"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
