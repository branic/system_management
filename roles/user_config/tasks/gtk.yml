---
- name: Gtk | Ensure GTK 3 config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/gtk-3.0"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Gtk | Configure GTK 3 bookmarks
  ansible.builtin.template:
    src: bookmarks.j2
    dest: "{{ ansible_user_dir }}/.config/gtk-3.0/bookmarks"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
