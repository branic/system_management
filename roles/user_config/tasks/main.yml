---
# tasks file for user_config

- name: Gather minimal facts
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min

- name: Include uv tasks
  ansible.builtin.include_tasks:
    file: uv.yml
  when: user_config_uv_install

- name: Include DConf tasks
  ansible.builtin.include_tasks:
    file: dconf.yml
  when: user_config_dconf_settings | length > 0

- name: Include Flatpak tasks
  ansible.builtin.include_tasks:
    file: flatpak.yml

- name: Include systemd user unit tasks
  when: (user_config_systemd_units | default([])) | length > 0
  ansible.builtin.include_tasks:
    file: systemd_units.yml

- name: Include GTK tasks
  ansible.builtin.include_tasks:
    file: gtk.yml

- name: Include GNOME Shell extension tasks
  ansible.builtin.include_tasks:
    file: gnome_extensions.yml
  when: user_config_gnome_extensions | length > 0

- name: Include uv tool install tasks
  ansible.builtin.include_tasks:
    file: uv_tools.yml
  when: user_config_uv_tools | length > 0

- name: Include VS Code / Cursor extension tasks
  ansible.builtin.include_tasks:
    file: code_extensions.yml
  when: >-
    (user_config_vscode_extensions | length > 0)
    or (user_config_cursor_extensions | length > 0)
