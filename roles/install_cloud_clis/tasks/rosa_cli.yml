---
- name: rosa_cli | Retrieve ROSA CLI releases from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/openshift/rosa/releases?per_page=100
  register: __install_cloud_clis_rosa_cli_releases

- name: rosa_cli | List GA releases with semver tag names
  ansible.builtin.set_fact:
    __install_cloud_clis_rosa_ga_releases: >-
      {{ __install_cloud_clis_rosa_cli_releases.json
         | selectattr('prerelease', 'equalto', false)
         | selectattr('draft', 'equalto', false)
         | selectattr('tag_name', 'match', '^v([0-9.]+)$')
         | list }}

- name: rosa_cli | Determine highest semver among GA releases
  ansible.builtin.set_fact:
    __install_cloud_clis_rosa_highest_semver: >-
      {{ (__install_cloud_clis_rosa_ga_releases
         | map(attribute='tag_name')
         | map('regex_replace', '^v', '')
         | list
         | community.general.version_sort
         | last) }}

- name: rosa_cli | Determine latest ROSA GA release details
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_rosa_cli_ver_details: >-
      {{ __install_cloud_clis_rosa_ga_releases
         | selectattr('tag_name', 'equalto', 'v' ~ __install_cloud_clis_rosa_highest_semver)
         | first }}

- name: rosa_cli | Assert a matching GA ROSA CLI release was resolved
  ansible.builtin.assert:
    that:
      - __install_cloud_clis_latest_rosa_cli_ver_details is defined
      - __install_cloud_clis_latest_rosa_cli_ver_details['tag_name'] is defined
    fail_msg: >-
      Could not resolve a GA ROSA CLI release for the highest semver (check API response and tag format).

- name: rosa_cli | Determine latest ROSA CLI version
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_rosa_cli_ver: >-
      {{ __install_cloud_clis_latest_rosa_cli_ver_details['tag_name'] |
         regex_replace('^v(?P<version>[0-9.]+)$', '\g<version>')
      }}

- name: rosa_cli | Check if ROSA CLI binary installed
  ansible.builtin.stat:
    path: "{{ install_cloud_clis_bin_dir }}/rosa"
  register: __install_cloud_clis_rosa_cli_installed

- name: rosa_cli | Check ROSA CLI versions (Block)
  when: __install_cloud_clis_rosa_cli_installed.stat.exists
  block:
    - name: rosa_cli | Retrieve installed ROSA CLI version
      ansible.builtin.command:
        cmd: rosa version
      register: __install_cloud_clis_rosa_ver_installed_result
      changed_when: false

    - name: rosa_cli | Determine installed ROSA CLI version
      ansible.builtin.set_fact:
        __install_cloud_clis_installed_rosa_cli_ver: "{{ __install_cloud_clis_rosa_ver_installed_result.stdout_lines | first | regex_replace('(?s)^INFO: (?P<version>\\d{1,2}\\.\\d{1,2}\\.\\d{1,3}).*$', '\\g<version>') }}"

    - name: rosa_cli | Determine if an update is needed
      ansible.builtin.set_fact:
        __install_cloud_clis_update_rosa_cli: "{{ __install_cloud_clis_installed_rosa_cli_ver is version(__install_cloud_clis_latest_rosa_cli_ver, '<', strict=False) }}"

- name: rosa_cli | Display ROSA CLI version info
  ansible.builtin.debug:
    msg: |
      [
        "Installed Version: {{ __install_cloud_clis_installed_rosa_cli_ver | default('NOT INSTALLED') }}",
        "Latest Version:    {{ __install_cloud_clis_latest_rosa_cli_ver | default('UNKNOWN') }}",
      ]
    verbosity: 1

- name: rosa_cli | Update ROSA CLI executable (Block)
  when: (not __install_cloud_clis_rosa_cli_installed.stat.exists) or (__install_cloud_clis_update_rosa_cli | default(false))
  block:
    - name: rosa_cli | Update ROSA CLI executable
      ansible.builtin.unarchive:
        src: "https://mirror.openshift.com/pub/cgw/rosa/{{ __install_cloud_clis_latest_rosa_cli_ver }}/rosa-linux.tar.gz"
        dest: "{{ install_cloud_clis_bin_dir }}"
        remote_src: true
        include:
          - "rosa"

    - name: rosa_cli | Add updated message
      when: __install_cloud_clis_update_rosa_cli | default(false)
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Updated ROSA CLI from " + __install_cloud_clis_installed_rosa_cli_ver + " to " + __install_cloud_clis_latest_rosa_cli_ver] }}

    - name: rosa_cli | Add installed message
      when: not __install_cloud_clis_rosa_cli_installed.stat.exists
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Installed ROSA CLI"] }}

- name: rosa_cli | Add rosa command-line completion to .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
    regexp: source <\(rosa completion bash\)
    line: command -v rosa &>/dev/null && source <(rosa completion bash)
