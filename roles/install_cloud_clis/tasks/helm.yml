---
## This commented out code is simpler, but it doesn't always reflect the
## latest release. For example on 2023-12-19 version v3.13.3 was available,
## but this was returning version v3.13.1. So it's better to get from GitHub.
# - name: helm | Retrieve helm CLI versions
#   ansible.builtin.uri:
#     url: https://get.helm.sh/helm-latest-version
#     return_content: true
#   register: __install_cloud_clis_helm_cli_latest_version_result
#
# - name: helm | Set version fact
#   ansible.builtin.set_fact:
#     __install_cloud_clis_latest_helm_cli_ver: "{{ __install_cloud_clis_helm_cli_latest_version_result['content'] | trim }}"

- name: helm | Retrieve helm CLI versions
  ansible.builtin.uri:
    url: https://api.github.com/repos/helm/helm/releases
  register: __install_cloud_clis_helm_cli_versions

- name: helm | Determine latest helm GA release version details
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_helm_cli_ver_details: >-
      {{ __install_cloud_clis_helm_cli_versions.json |
         selectattr('prerelease', 'equalto', false) |
         first
      }}

- name: helm | Determine latest helm version
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_helm_cli_ver: >-
      {{ __install_cloud_clis_latest_helm_cli_ver_details['tag_name'] }}

- name: helm | Check if helm binary installed
  ansible.builtin.stat:
    path: "{{ install_cloud_clis_bin_dir }}/helm"
  register: __install_cloud_clis_helm_cli_installed

- name: helm | Check helm versions (Block)
  when: __install_cloud_clis_helm_cli_installed.stat.exists
  block:
    - name: helm | Retrieve installed helm version
      ansible.builtin.command:
        cmd: helm version --template='{% raw %}{{ .Version }}{% endraw %}'
      register: __install_cloud_clis_helm_installed_cli_version_result
      changed_when: false

    - name: helm | Determine installed helm version
      ansible.builtin.set_fact:
        __install_cloud_clis_installed_helm_cli_ver: "{{ __install_cloud_clis_helm_installed_cli_version_result.stdout }}"

- name: helm | Display helm version info
  ansible.builtin.debug:
    msg: |
      [
        "Installed Version: {{ __install_cloud_clis_installed_helm_cli_ver | default('NOT INSTALLED') }}",
        "Latest Version:    {{ __install_cloud_clis_latest_helm_cli_ver }}",
      ]
    verbosity: 1

- name: helm | Update helm executable (Block)
  when: (not __install_cloud_clis_helm_cli_installed.stat.exists) or (__install_cloud_clis_installed_helm_cli_ver != __install_cloud_clis_latest_helm_cli_ver)
  block:
    - name: helm | Update helm executable
      ansible.builtin.unarchive:
        src: https://get.helm.sh/helm-{{ __install_cloud_clis_latest_helm_cli_ver }}-linux-amd64.tar.gz
        dest: "{{ install_cloud_clis_bin_dir }}"
        remote_src: true
        include:
          - "linux-amd64/helm"
        extra_opts:
          - --strip-components=1

    - name: helm | Add updated message
      when: (__install_cloud_clis_installed_helm_cli_ver is defined) and (__install_cloud_clis_installed_helm_cli_ver != __install_cloud_clis_latest_helm_cli_ver)
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Updated helm from " + __install_cloud_clis_installed_helm_cli_ver + " to " + __install_cloud_clis_latest_helm_cli_ver] }}

    - name: helm | Add installed message
      when: not __install_cloud_clis_helm_cli_installed.stat.exists
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Installed helm"] }}

- name: helm | Add helm command-line completion to .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_user_dir }}/.bashrc"
    line: source <(helm completion bash)
