---
- name: tekton_cli | Retrieve Tekton CLI versions
  ansible.builtin.uri:
    url: https://api.github.com/repos/tektoncd/cli/releases?per_page=100
  register: __install_cloud_clis_tekton_cli_versions

- name: tekton_cli | List GA releases with semver tag names
  ansible.builtin.set_fact:
    __install_cloud_clis_tekton_ga_releases: >-
      {{ __install_cloud_clis_tekton_cli_versions.json
         | selectattr('prerelease', 'equalto', false)
         | selectattr('draft', 'equalto', false)
         | selectattr('tag_name', 'match', '^v?([0-9.]+)$')
         | list }}

- name: tekton_cli | Determine highest semver among GA releases
  ansible.builtin.set_fact:
    __install_cloud_clis_tekton_highest_semver: >-
      {{ (__install_cloud_clis_tekton_ga_releases
         | map(attribute='tag_name')
         | map('regex_replace', '^v', '')
         | list
         | community.general.version_sort
         | last) }}

- name: tekton_cli | Determine latest Tekton CLI GA release version details
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_tekton_cli_ver_details: >-
      {{ __install_cloud_clis_tekton_ga_releases
         | selectattr('tag_name', 'equalto', 'v' ~ __install_cloud_clis_tekton_highest_semver)
         | first }}

- name: tekton_cli | Assert a matching GA Tekton CLI release was resolved
  ansible.builtin.assert:
    that:
      - __install_cloud_clis_latest_tekton_cli_ver_details is defined
      - __install_cloud_clis_latest_tekton_cli_ver_details['tag_name'] is defined
    fail_msg: >-
      Could not resolve a GA Tekton CLI release for the highest semver (check API response and tag format).

- name: tekton_cli | Determine latest Tekton CLI version
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_tekton_cli_ver: "{{ __install_cloud_clis_latest_tekton_cli_ver_details['tag_name'] | regex_replace('^v', '') }}"

- name: tekton_cli | Determine latest Tekton CLI download URL
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_tekton_cli_url: "{{ __install_cloud_clis_latest_tekton_cli_ver_details['assets'] | selectattr('name', 'equalto', 'tkn_' + __install_cloud_clis_latest_tekton_cli_ver + '_Linux_x86_64.tar.gz') | map(attribute='browser_download_url') | first }}"

- name: tekton_cli | Check if Tekton CLI binary installed
  ansible.builtin.stat:
    path: "{{ install_cloud_clis_bin_dir }}/tkn"
  register: __install_cloud_clis_tekton_cli_installed

- name: tekton_cli | Check Tekton CLI versions (Block)
  when: __install_cloud_clis_tekton_cli_installed.stat.exists
  block:
    - name: tekton_cli | Retrieve installed Tekton CLI version
      ansible.builtin.command:
        cmd: tkn version --component client
      register: __install_cloud_clis_tekton_ver_installed_result
      changed_when: false

    - name: tekton_cli | Determine installed Tekton CLI version
      ansible.builtin.set_fact:
        __install_cloud_clis_installed_tekton_cli_ver: "{{ __install_cloud_clis_tekton_ver_installed_result.stdout | trim }}"

- name: tekton_cli | Display Tekton CLI version info
  ansible.builtin.debug:
    msg: |
      [
        "Installed Version: {{ __install_cloud_clis_installed_tekton_cli_ver | default('NOT INSTALLED') }}",
        "Latest Version:    {{ __install_cloud_clis_latest_tekton_cli_ver }}",
        "URL for latest version: {{ __install_cloud_clis_latest_tekton_cli_url }}"
      ]
    verbosity: 1

- name: tekton_cli | Update Tekton CLI executable (Block)
  when: >-
    (not __install_cloud_clis_tekton_cli_installed.stat.exists)
    or (
      __install_cloud_clis_installed_tekton_cli_ver is defined
      and __install_cloud_clis_installed_tekton_cli_ver is version(__install_cloud_clis_latest_tekton_cli_ver, '<')
    )
  block:
    - name: tekton_cli | Update Tekton CLI executable
      ansible.builtin.unarchive:
        src: "{{ __install_cloud_clis_latest_tekton_cli_url }}"
        dest: "{{ install_cloud_clis_bin_dir }}"
        remote_src: true
        include:
          - "tkn"

    - name: tekton_cli | Add updated message
      when: >-
        __install_cloud_clis_installed_tekton_cli_ver is defined
        and __install_cloud_clis_installed_tekton_cli_ver is version(__install_cloud_clis_latest_tekton_cli_ver, '<')
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Updated Tekton CLI from " + __install_cloud_clis_installed_tekton_cli_ver + " to " + __install_cloud_clis_latest_tekton_cli_ver] }}

    - name: tekton_cli | Add installed message
      when: not __install_cloud_clis_tekton_cli_installed.stat.exists
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Installed Tekton CLI"] }}

- name: tekton_cli | Add Tekton command-line completion to .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
    line: source <(tkn completion bash)
