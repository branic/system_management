---
- name: kube-linter | Retrieve kube-linter CLI versions
  ansible.builtin.uri:
    url: https://api.github.com/repos/stackrox/kube-linter/releases?per_page=100
  register: __install_cloud_clis_kube_linter_cli_versions

- name: kube-linter | List GA releases with semver tag names
  ansible.builtin.set_fact:
    __install_cloud_clis_kube_linter_ga_releases: >-
      {{ __install_cloud_clis_kube_linter_cli_versions.json
         | selectattr('prerelease', 'equalto', false)
         | selectattr('draft', 'equalto', false)
         | selectattr('tag_name', 'match', '^v([0-9.]+)$')
         | list }}

- name: kube-linter | Determine highest semver among GA releases
  ansible.builtin.set_fact:
    __install_cloud_clis_kube_linter_highest_semver: >-
      {{ (__install_cloud_clis_kube_linter_ga_releases
         | map(attribute='tag_name')
         | map('regex_replace', '^v', '')
         | list
         | community.general.version_sort
         | last) }}

- name: kube-linter | Determine latest kube-linter GA release version details
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_kube_linter_cli_ver_details: >-
      {{ __install_cloud_clis_kube_linter_ga_releases
         | selectattr('tag_name', 'equalto', 'v' ~ __install_cloud_clis_kube_linter_highest_semver)
         | first }}

- name: kube-linter | Assert a matching GA kube-linter release was resolved
  ansible.builtin.assert:
    that:
      - __install_cloud_clis_latest_kube_linter_cli_ver_details is defined
      - __install_cloud_clis_latest_kube_linter_cli_ver_details['tag_name'] is defined
    fail_msg: >-
      Could not resolve a GA kube-linter release for the highest semver (check API response and tag format).

- name: kube-linter | Determine latest kube-linter version
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_kube_linter_cli_ver: "{{ __install_cloud_clis_latest_kube_linter_cli_ver_details['tag_name'] | regex_replace('^v(?P<version>[0-9.]+)$', '\\g<version>') }}"

- name: kube-linter | Determine latest kube-linter download URL
  ansible.builtin.set_fact:
    __install_cloud_clis_latest_kube_linter_cli_url: "{{ __install_cloud_clis_latest_kube_linter_cli_ver_details['assets'] | selectattr('name', 'equalto', 'kube-linter-linux.tar.gz') | map(attribute='browser_download_url') | first }}"

- name: kube-linter | Check if kube-linter binary installed
  ansible.builtin.stat:
    path: "{{ install_cloud_clis_bin_dir }}/kube-linter"
  register: __install_cloud_clis_kube_linter_cli_installed

- name: kube-linter | Check kube-linter versions (Block)
  when: __install_cloud_clis_kube_linter_cli_installed.stat.exists
  block:
    - name: kube-linter | Retrieve installed kube-linter version
      ansible.builtin.command:
        cmd: kube-linter version
      register: __install_cloud_clis_kube_linter_ver_installed_result
      changed_when: false

    - name: kube-linter | Determine installed kube-linter version
      ansible.builtin.set_fact:
        __install_cloud_clis_installed_kube_linter_cli_ver: "{{ __install_cloud_clis_kube_linter_ver_installed_result.stdout | regex_replace('(?s)^v(?P<version>\\d{1,2}\\.\\d{1,2}\\.\\d{1,3}).*$', '\\g<version>') }}"

- name: kube-linter | Display kube-linter version info
  ansible.builtin.debug:
    msg: |
      [
        "Installed Version: {{ __install_cloud_clis_installed_kube_linter_cli_ver | default('NOT INSTALLED') }}",
        "Latest Version:    {{ __install_cloud_clis_latest_kube_linter_cli_ver }}",
        "URL for latest version: {{ __install_cloud_clis_latest_kube_linter_cli_url }}"
      ]
    verbosity: 1

- name: kube-linter | Update kube-linter executable (Block)
  when: >-
    (not __install_cloud_clis_kube_linter_cli_installed.stat.exists)
    or (
      __install_cloud_clis_installed_kube_linter_cli_ver is defined
      and __install_cloud_clis_installed_kube_linter_cli_ver is version(__install_cloud_clis_latest_kube_linter_cli_ver, '<')
    )
  block:
    - name: kube-linter | Update kube-linter executable
      ansible.builtin.unarchive:
        src: "{{ __install_cloud_clis_latest_kube_linter_cli_url }}"
        dest: "{{ install_cloud_clis_bin_dir }}"
        remote_src: true
        include:
          - "kube-linter"

    - name: kube-linter | Add updated message
      when: >-
        __install_cloud_clis_installed_kube_linter_cli_ver is defined
        and __install_cloud_clis_installed_kube_linter_cli_ver is version(__install_cloud_clis_latest_kube_linter_cli_ver, '<')
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Updated kube-linter from " + __install_cloud_clis_installed_kube_linter_cli_ver + " to " + __install_cloud_clis_latest_kube_linter_cli_ver] }}

    - name: kube-linter | Add installed message
      when: not __install_cloud_clis_kube_linter_cli_installed.stat.exists
      ansible.builtin.set_fact:
        install_cloud_clis_update_messages: >
          {{ install_cloud_clis_update_messages + ["Installed kube-linter"] }}

- name: kube-linter | Add kube-linter command-line completion to .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
    line: source <(kube-linter completion bash)
