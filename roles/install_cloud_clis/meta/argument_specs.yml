---
argument_specs:
  main:
    short_description: Install and update cloud and Kubernetes CLIs for the connection user
    description:
      - Installs or updates CLIs under install_cloud_clis_bin_dir (defaults at runtime to ~/.local/bin under ansible_facts user_dir after the role gathers facts).
    author:
      - Brant Evans
    options:
      install_cloud_clis_components:
        type: list
        elements: str
        required: false
        default:
          - aws
          - oc
          - rosa
          - tekton
          - kube_linter
          - kustomize
          - stern
          - helm
        description:
          - Which CLIs to install or update. Allowed values are aws, oc, rosa, tekton, kube_linter, kustomize, stern, helm.

      install_cloud_clis_bin_dir:
        type: str
        required: false
        description:
          - Directory where CLI binaries are installed (must be on PATH for interactive use).
          - If unset, the role sets this after gathering facts to ansible_facts user_dir plus /.local/bin.

      install_cloud_clis_aws_install_root:
        type: str
        required: false
        description:
          - AWS CLI installation directory (-i) passed to the official AWS CLI installer.
          - If unset, the role sets this when running AWS tasks to ansible_facts user_dir plus /.local/aws-cli.
